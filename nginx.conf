server {
    listen 80;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json image/svg+xml;

    # ── Suppress source map 404s ──────────────────────────────────────────────
    location ~* \.map$ {
        return 204;
    }

    # ── Static files — served directly with long-lived cache ─────────────────
    location /static/ {
        alias /app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket — must upgrade connection ───────────────────────────────────
    location /ws/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API docs (FastAPI auto-generated) ────────────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass           http://api:8000;
        proxy_set_header     Host $host;
    }

    # ── API — proxy to FastAPI backend ────────────────────────────────────────
    location /api/ {
        proxy_pass             http://api:8000;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        client_max_body_size   100M;
    }

    # ── Root and all other paths — serve index.html ───────────────────────────
    location / {
        root      /app/frontend/static;
        try_files $uri /index.html;
    }
}
